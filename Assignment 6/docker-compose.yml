version: '3.9'

services:
  # ── MongoDB ──
  mongodb:
    image: mongo:7.0
    container_name: attendance_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: attendance_system
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    networks:
      - attendance_net

  # ── Redis (Bull queue) ──
  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    networks:
      - attendance_net

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendance_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/attendance_system
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - attendance_net

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: attendance_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - attendance_net

volumes:
  mongo_data:
  redis_data:

networks:
  attendance_net:
    driver: bridge
